app = "highnet-war-backend"
primary_region = "iad"

[build]
  dockerfile = "apps/backend/Dockerfile.prod"

[env]
  PORT = "3001"
  NODE_ENV = "production"
  REDIS_URL = "redis://localhost:6379"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
